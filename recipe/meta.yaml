{% set versions = {
    "1.2.0": "0a794388124981bb62aa1a18393bb54e931a959c73d6f0d9a3c36276a36f0fbb"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'estarlight')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/eic/estarlight/archive/refs/tags/v{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - hepmc                     # ENABLE_HEPMC3 -- eStarlight's HepMC3 event output
  run:
    - hepmc

test:
  commands:
    # e_main.cpp ignores argv and immediately runs a full simulation off
    # a config file in cwd -- no --help/dry-run mode to smoke-test against,
    # so just confirm the binary + library got installed.
    - test -x "${PREFIX}/bin/e_starlight"
    - test -f "${PREFIX}/lib/libStarlib.a"

about:
  home: "https://github.com/eic/estarlight"
  license: "GPL-3.0-or-later"
  summary: "Monte Carlo for coherent vector meson photo-/electro-production in electron-ion collisions"
  description: |
    eStarlight is the EIC fork of STARlight, a Monte Carlo simulation
    for peripheral heavy ion collisions producing exclusive final states
    through coherent particle photo-/electro-production. Built here with
    HepMC3 event output enabled; Pythia6/Pythia8 sub-process support is
    left disabled.

extra:
  recipe-maintainers:
    - meiyasan
